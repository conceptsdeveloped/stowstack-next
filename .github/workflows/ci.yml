name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so pushes don't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, test, lint
    runs-on: ubuntu-latest
    env:
      # prisma generate bakes in the datasource env reference. A placeholder
      # keeps generation happy without touching a real database — the test
      # suite mocks @/lib/db, so nothing here connects to Postgres.
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # postinstall already runs this, but keep it explicit so a cached
      # node_modules without a fresh client still type-checks.
      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      # Lint is informational for now: the marketing animation hooks carry
      # pre-existing react-hooks/set-state-in-effect errors. Drop
      # continue-on-error once those are cleaned up to make lint a hard gate.
      - name: Lint
        run: npm run lint
        continue-on-error: true
